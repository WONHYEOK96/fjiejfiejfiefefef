<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아날로그 시계</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #f5f5f0 0%, #e8e8e0 100%);
      font-family: 'Noto Sans KR', sans-serif;
    }

    .clock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    svg#clock {
      width: min(60vw, 60vh, 400px);
      height: min(60vw, 60vh, 400px);
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.10));
    }

    .date {
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 300;
      color: #888;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="clock-wrap">
    <svg id="clock" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- 배경 원 -->
      <circle cx="100" cy="100" r="96" fill="white"/>

      <!-- 시각 점 마커 (12개) -->
      <g id="markers"></g>

      <!-- 시침 -->
      <line id="hour-hand"   x1="100" y1="100" x2="100" y2="55"
            stroke="#333" stroke-width="4" stroke-linecap="round"/>

      <!-- 분침 -->
      <line id="minute-hand" x1="100" y1="100" x2="100" y2="38"
            stroke="#666" stroke-width="2.5" stroke-linecap="round"/>

      <!-- 초침 -->
      <line id="second-hand" x1="100" y1="112" x2="100" y2="34"
            stroke="#e05a5a" stroke-width="1.2" stroke-linecap="round"/>

      <!-- 중심 원 -->
      <circle cx="100" cy="100" r="3.5" fill="#333"/>
      <circle cx="100" cy="100" r="1.5" fill="white"/>
    </svg>
    <div class="date" id="date"></div>
  </div>

  <script>
    // 시각 마커 생성
    const markersGroup = document.getElementById('markers');
    for (let i = 0; i < 12; i++) {
      const angle = (i * 30 - 90) * Math.PI / 180;
      const r = 84;
      const cx = 100 + r * Math.cos(angle);
      const cy = 100 + r * Math.sin(angle);
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', i % 3 === 0 ? 2.5 : 1.5);
      circle.setAttribute('fill', i % 3 === 0 ? '#bbb' : '#ddd');
      markersGroup.appendChild(circle);
    }

    function setHand(id, angleDeg, cx, cy, length, tailLength) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      const x2 = cx + length * Math.cos(rad);
      const y2 = cy + length * Math.sin(rad);
      const tx = cx - tailLength * Math.cos(rad);
      const ty = cy - tailLength * Math.sin(rad);
      const el = document.getElementById(id);
      el.setAttribute('x1', tx);
      el.setAttribute('y1', ty);
      el.setAttribute('x2', x2);
      el.setAttribute('y2', y2);
    }

    function update() {
      const now = new Date();
      const h = now.getHours() % 12;
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      const secAngle  = s * 6 + ms * 0.006;
      const minAngle  = m * 6 + s * 0.1;
      const hourAngle = h * 30 + m * 0.5;

      setHand('hour-hand',   hourAngle, 100, 100, 45, 12);
      setHand('minute-hand', minAngle,  100, 100, 62, 10);
      setHand('second-hand', secAngle,  100, 100, 66, 12);

      document.getElementById('date').textContent =
        now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    update();
    setInterval(update, 50);
  </script>
</body>
</html>
