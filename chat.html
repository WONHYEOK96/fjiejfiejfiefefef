<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 AI 채팅창</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b2d45 50%, #0d1b2a 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── API 키 설정 화면 ── */
    #setup-screen {
      width: 100%;
      max-width: 480px;
      padding: 2rem;
      text-align: center;
    }

    #setup-screen h1 {
      font-size: 1.6rem;
      font-weight: 500;
      color: #87CEEB;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(135, 206, 235, 0.4);
    }

    #setup-screen p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    #setup-screen a {
      color: #87CEEB;
      text-decoration: none;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .input-group input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(135, 206, 235, 0.25);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: rgba(135, 206, 235, 0.6);
    }

    .btn {
      background: rgba(135, 206, 235, 0.15);
      border: 1px solid rgba(135, 206, 235, 0.35);
      border-radius: 10px;
      padding: 0.75rem 1.2rem;
      color: #87CEEB;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      background: rgba(135, 206, 235, 0.25);
    }

    .error-msg {
      color: #ff8a8a;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    /* ── 채팅 화면 ── */
    #chat-screen {
      display: none;
      width: 100%;
      max-width: 720px;
      height: 100vh;
      flex-direction: column;
      padding: 1rem;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(135, 206, 235, 0.15);
      margin-bottom: 0.75rem;
    }

    .chat-header h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #87CEEB;
      text-shadow: 0 0 15px rgba(135, 206, 235, 0.35);
    }

    .chat-header button {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 0.35rem 0.75rem;
      color: rgba(255,255,255,0.4);
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .chat-header button:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.3);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      padding-right: 0.25rem;
    }

    #messages::-webkit-scrollbar {
      width: 4px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(135, 206, 235, 0.2);
      border-radius: 2px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 0.7rem 1rem;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: rgba(135, 206, 235, 0.18);
      border: 1px solid rgba(135, 206, 235, 0.3);
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 4px;
    }

    .sender-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.3rem;
      padding: 0 0.25rem;
    }

    /* 로딩 점 애니메이션 */
    .typing {
      display: flex;
      gap: 5px;
      padding: 0.7rem 1rem;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: rgba(135, 206, 235, 0.5);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* 입력창 */
    .input-bar {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(135, 206, 235, 0.15);
      margin-top: 0.75rem;
    }

    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(135, 206, 235, 0.25);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #user-input:focus {
      border-color: rgba(135, 206, 235, 0.55);
    }

    #send-btn {
      background: rgba(135, 206, 235, 0.15);
      border: 1px solid rgba(135, 206, 235, 0.35);
      border-radius: 12px;
      padding: 0 1.1rem;
      color: #87CEEB;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
      height: 48px;
    }

    #send-btn:hover:not(:disabled) {
      background: rgba(135, 206, 235, 0.28);
    }

    #send-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- API 키 설정 화면 -->
  <div id="setup-screen">
    <h1>나만의 AI 채팅창</h1>
    <p>
      OpenAI API 키를 입력하면 GPT와 대화할 수 있어요.<br>
      키는 이 브라우저에만 저장되고 외부로 전송되지 않아요.<br>
      <a href="https://platform.openai.com/api-keys" target="_blank">→ API 키 발급받기</a>
    </p>
    <div class="input-group">
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
      <button class="btn" id="save-key-btn">시작하기</button>
    </div>
    <div class="error-msg" id="key-error"></div>
  </div>

  <!-- 채팅 화면 -->
  <div id="chat-screen">
    <div class="chat-header">
      <h1>나만의 GPT 채팅창</h1>
      <button id="change-key-btn">API 키 변경</button>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
      <textarea id="user-input" placeholder="메시지를 입력하세요... (Shift+Enter 줄바꿈)" rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'anthropic_api_key';
    let conversationHistory = [];
    let isLoading = false;

    const setupScreen = document.getElementById('setup-screen');
    const chatScreen  = document.getElementById('chat-screen');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveKeyBtn  = document.getElementById('save-key-btn');
    const keyError    = document.getElementById('key-error');
    const messagesEl  = document.getElementById('messages');
    const userInput   = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');
    const changeKeyBtn = document.getElementById('change-key-btn');

    function getApiKey() {
      return localStorage.getItem(STORAGE_KEY) || '';
    }

    function init() {
      if (getApiKey()) {
        showChat();
      } else {
        showSetup();
      }
    }

    function showSetup() {
      setupScreen.style.display = 'block';
      chatScreen.style.display  = 'none';
      apiKeyInput.focus();
    }

    function showChat() {
      setupScreen.style.display = 'none';
      chatScreen.style.display  = 'flex';
      if (messagesEl.children.length === 0) {
        appendMessage('assistant', '안녕하세요! 무엇이든 물어보세요 😊');
      }
      userInput.focus();
    }

    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key.startsWith('sk-')) {
        keyError.textContent = 'API 키는 sk- 로 시작해야 해요.';
        return;
      }
      localStorage.setItem(STORAGE_KEY, key);
      keyError.textContent = '';
      showChat();
    });

    apiKeyInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveKeyBtn.click();
    });

    changeKeyBtn.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      conversationHistory = [];
      messagesEl.innerHTML = '';
      apiKeyInput.value = '';
      showSetup();
    });

    function appendMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role === 'user' ? 'user' : 'assistant'}`;

      const label = document.createElement('div');
      label.className = 'sender-label';
      label.textContent = role === 'user' ? '나' : 'Claude';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function appendTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message assistant';
      wrapper.id = 'typing-indicator';

      const label = document.createElement('div');
      label.className = 'sender-label';
      label.textContent = 'Claude';

      const typing = document.createElement('div');
      typing.className = 'bubble typing';
      typing.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(label);
      wrapper.appendChild(typing);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      if (isLoading) return;
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = '';
      userInput.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;

      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      appendTyping();

      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${getApiKey()}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            max_tokens: 1024,
            messages: conversationHistory,
          }),
        });

        removeTyping();

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          if (response.status === 401) {
            appendMessage('assistant', '❌ API 키가 올바르지 않아요. 오른쪽 상단 "API 키 변경" 버튼으로 다시 입력해주세요.');
          } else {
            appendMessage('assistant', `❌ 오류 발생: ${err.error?.message || response.statusText}`);
          }
          conversationHistory.pop();
        } else {
          const data = await response.json();
          const reply = data.choices[0].message.content;
          appendMessage('assistant', reply);
          conversationHistory.push({ role: 'assistant', content: reply });
        }
      } catch (e) {
        removeTyping();
        appendMessage('assistant', '❌ 네트워크 오류가 발생했어요. 인터넷 연결을 확인해주세요.');
        conversationHistory.pop();
      }

      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
    });

    init();
  </script>
</body>
</html>
